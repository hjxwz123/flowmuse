services:
  mysql:
    image: mysql:8.0
    container_name: aigallery-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aigallery}
      MYSQL_USER: ${MYSQL_USER:-aigallery}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_db_password}
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} || mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: aigallery-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/your-username/aigallery-backend:latest}
    container_name: aigallery-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-aigallery}:${MYSQL_PASSWORD:-change_db_password}@mysql:3306/${MYSQL_DATABASE:-aigallery}?charset=utf8mb4
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "./node_modules/.bin/prisma migrate deploy && node dist/src/main.js"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/your-username/aigallery-frontend:latest}
    container_name: aigallery-frontend
    restart: unless-stopped
    environment:
      PORT: 3001
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3001}:3001"

volumes:
  mysql_data:
  redis_data:
  uploads_data:
